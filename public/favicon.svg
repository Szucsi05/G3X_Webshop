<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      @keyframes gradientShift {
        0% { stop-color: #00ff99; }
        50% { stop-color: #ff00ff; }
        100% { stop-color: #00ff99; }
      }
      .g3x-text {
        font-family: 'Arial Black', sans-serif;
        font-size: 120px;
        font-weight: 900;
        fill: url(#gradient);
        text-anchor: middle;
        dominant-baseline: middle;
      }
    </style>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff99;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff99;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  
  <rect width="200" height="200" fill="#0b1c2c"/>
  
  
  <text x="100" y="110" class="g3x-text">G3X</text>
  
  
  <circle cx="100" cy="100" r="95" fill="none" stroke="#00ff99" stroke-width="2" opacity="0.3"/>
</svg>
